# Coolify Deployment Configuration for YOLO Car Plate Detection System
# This file can be imported into Coolify for easy deployment

version: "2"

services:
  # Main Application Service
  main-app:
    name: "YOLO Car Detection - Main"
    source:
      type: "git"
      repository: "https://github.com/your-username/YOLO26.git"  # Replace with your repo
      branch: "main"
    build:
      dockerfile: "Dockerfile"
      context: "."
    ports:
      - "7860:7860"
    environment:
      - GRADIO_SERVER_PORT=7860
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - "/app/uploads"
      - "/app/processed"
      - "/app/inputs"
      - "/app/outputs"
    deploy:
      replicas: 1
      restart_policy: "unless-stopped"
      resources:
        limits:
          memory: "4Gi"
          cpus: "2"
        reservations:
          memory: "2Gi"
          cpus: "1"

  # License Plate Detector Service
  plate-detector:
    name: "YOLO - Plate Detector"
    source:
      type: "git"
      repository: "https://github.com/your-username/YOLO26.git"  # Replace with your repo
      branch: "main"
    build:
      dockerfile: "Dockerfile"
      context: "."
    ports:
      - "7861:7861"
    environment:
      - GRADIO_SERVER_PORT=7861
    command: ["python", "apps/license_plate_image_detector.py"]
    volumes:
      - "/app/uploads"
      - "/app/processed"
    deploy:
      replicas: 1
      restart_policy: "unless-stopped"
      resources:
        limits:
          memory: "2Gi"
          cpus: "1"

  # Enhanced Detector Service
  enhanced-detector:
    name: "YOLO - Enhanced Detector"
    source:
      type: "git"
      repository: "https://github.com/your-username/YOLO26.git"  # Replace with your repo
      branch: "main"
    build:
      dockerfile: "Dockerfile"
      context: "."
    ports:
      - "7862:7862"
    environment:
      - GRADIO_SERVER_PORT=7862
    command: ["python", "apps/enhanced_plate_detector.py"]
    volumes:
      - "/app/uploads"
      - "/app/processed"
    deploy:
      replicas: 1
      restart_policy: "unless-stopped"
      resources:
        limits:
          memory: "2Gi"
          cpus: "1"

  # Guaranteed Detector Service
  guaranteed-detector:
    name: "YOLO - Guaranteed Detector"
    source:
      type: "git"
      repository: "https://github.com/your-username/YOLO26.git"  # Replace with your repo
      branch: "main"
    build:
      dockerfile: "Dockerfile"
      context: "."
    ports:
      - "7863:7863"
    environment:
      - GRADIO_SERVER_PORT=7863
    command: ["python", "apps/guaranteed_plate_detector.py"]
    volumes:
      - "/app/uploads"
      - "/app/processed"
    deploy:
      replicas: 1
      restart_policy: "unless-stopped"
      resources:
        limits:
          memory: "2Gi"
          cpus: "1"

  # Parking Dashboard Service
  parking-dashboard:
    name: "YOLO - Parking Dashboard"
    source:
      type: "git"
      repository: "https://github.com/your-username/YOLO26.git"  # Replace with your repo
      branch: "main"
    build:
      dockerfile: "Dockerfile"
      context: "."
    ports:
      - "5000:5000"
    command: ["python", "apps/parking_dashboard.py"]
    volumes:
      - "/app/uploads"
      - "/app/processed"
      - "/app/parking_detections"
    deploy:
      replicas: 1
      restart_policy: "unless-stopped"
      resources:
        limits:
          memory: "1Gi"
          cpus: "0.5"

# Network Configuration
networks:
  default:
    name: "yolo-network"
    driver: "bridge"

# Storage Volumes
volumes:
  uploads:
    name: "yolo-uploads"
  processed:
    name: "yolo-processed"
  inputs:
    name: "yolo-inputs"
  outputs:
    name: "yolo-outputs"
  parking_detections:
    name: "yolo-parking-detections"
