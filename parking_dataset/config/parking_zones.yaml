# Detection parameters
detection_config:
  confidence_threshold: 0.85
  iou_threshold: 0.45
  min_confidence_occupied: 0.85
  min_confidence_empty: 0.90
  processing_interval: 1  # seconds (changed from 30 to 1 for continuous display)
  input_resolution: [1920, 1080]
  model_input_size: 640
  
# Vehicle types to detect
vehicle_types:
  - "car"
  - "suv" 
  - "truck"
  - "motorcycle"
  - "bicycle"

# Training data requirements
training_config:
  min_images_per_zone: 10000
  balanced_dataset: true
  train_val_split: 0.8
  augmentation:
    - "rotation"
    - "brightness"
    - "contrast"
    - "noise"
    - "weather_simulation"
  batch_size: 16
  epochs: 100
  learning_rate: 0.001

# Output format specification
output_format:
  json_structure:
    zone_id: "string"
    total_spots: "integer"
    occupied_spots: "integer"
    empty_spots: "integer"
    occupancy_rate: "float"
    timestamp: "string"
    spot_details:
      spot_id: "string"
      status: "OCCUPIED|EMPTY"
      confidence: "float"
      vehicle_type: "string|null"
      bounding_box: "[x1, y1, x2, y2]"
